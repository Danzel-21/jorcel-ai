<!DOCTYPE html>
<html>
<head>
    <title>Jorcel AI</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 50px auto;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
        }

        .chat {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<h1>Jorcel AI Assistant</h1>

<form method="post">
    <textarea name="message" placeholder="Ask something..."></textarea>
    <br>
    <button type="submit">Send</button>
</form>

{% if message %}
<div class="chat">
    <strong>You:</strong>
    <p>{{ message }}</p>

    <strong>AI:</strong>
    <p>{{ response }}</p>
</div>
{% endif %}

</body>
</html>
